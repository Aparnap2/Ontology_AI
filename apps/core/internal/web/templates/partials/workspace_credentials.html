<div class="card p-4 fade-in">
    <div class="flex items-center justify-between mb-4">
        <h2 class="font-semibold text-sm md:text-base">Credentials</h2>
        <button class="btn btn-primary"
                hx-get="/api/workspace/credentials/add"
                hx-target="#credential-form-container"
                hx-swap="innerHTML"
                hx-trigger="click">+ Add Credential</button>
    </div>

    <!-- Form container for add credential form -->
    <div id="credential-form-container" class="mb-4"></div>

    <!-- Credential list -->
    <div id="credential-list" class="space-y-2">
        {{if .Credentials}}
            {{range .Credentials}}
            <div id="credential-row-{{.ID}}" class="flex items-center justify-between p-3 rounded-lg" style="background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05)">
                <div class="flex items-center gap-3">
                    <!-- Provider badge -->
                    <span class="agent-pill" style="background:rgba(125,211,252,.12);color:#7dd3fc;text-transform:capitalize">{{.Provider}}</span>
                    <!-- Name -->
                    <span class="text-sm font-medium">{{.Name}}</span>
                </div>
                <div class="flex items-center gap-3">
                    <!-- Created at -->
                    <span class="text-xs" style="color:var(--text-muted)">{{.CreatedAt}}</span>
                    <!-- Delete button -->
                    <button class="btn text-xs"
                            style="background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.2);min-height:32px;padding:0.25rem 0.5rem"
                            hx-delete="/api/workspace/credentials/{{.ID}}"
                            hx-target="#credential-row-{{.ID}}"
                            hx-swap="outerHTML swap:0.3s"
                            hx-confirm="Delete this credential?">Delete</button>
                </div>
            </div>
            {{end}}
        {{else}}
            <div class="flex flex-col items-center justify-center py-8" style="color:var(--text-muted)">
                <svg class="w-8 h-8 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                <p class="text-sm">No credentials configured</p>
                <p class="text-xs mt-1">Click "Add Credential" to connect your first service.</p>
            </div>
        {{end}}
    </div>
</div>
