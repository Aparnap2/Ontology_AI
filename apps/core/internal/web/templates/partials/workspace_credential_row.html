<div id="credential-row-{{.Credential.ID}}" class="flex items-center justify-between p-3 rounded-lg fade-in" style="background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05)">
    <div class="flex items-center gap-3">
        <!-- Provider badge -->
        <span class="agent-pill" style="background:rgba(125,211,252,.12);color:#7dd3fc;text-transform:capitalize">{{.Credential.Provider}}</span>
        <!-- Name -->
        <span class="text-sm font-medium">{{.Credential.Name}}</span>
    </div>
    <div class="flex items-center gap-3">
        <!-- Created at -->
        <span class="text-xs" style="color:var(--text-muted)">{{.Credential.CreatedAt}}</span>
        <!-- Delete button -->
        <button class="btn text-xs"
                style="background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.2);min-height:32px;padding:0.25rem 0.5rem"
                hx-delete="/api/workspace/credentials/{{.Credential.ID}}"
                hx-target="#credential-row-{{.Credential.ID}}"
                hx-swap="outerHTML swap:0.3s"
                hx-confirm="Delete this credential?">Delete</button>
    </div>
</div>
