<div class="card p-4 mb-4 fade-in" style="background:rgba(125,211,252,.04);border-color:rgba(125,211,252,.15)">
    <h3 class="font-semibold text-sm mb-3">Add Credential</h3>
    <form hx-post="/api/workspace/credentials"
          hx-target="#credential-list"
          hx-swap="afterbegin"
          hx-on::after-request="if(event.detail.successful) { this.reset(); document.getElementById('credential-form-container').innerHTML=''; }"
          class="space-y-3">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <!-- Provider dropdown -->
            <div>
                <label class="text-xs font-medium mb-1 block" style="color:var(--text-secondary)">Provider</label>
                <select name="provider" class="input-dark w-full text-xs" required>
                    <option value="">Select provider...</option>
                    {{range .Providers}}
                    <option value="{{.Value}}">{{.Label}}</option>
                    {{end}}
                </select>
            </div>
            <!-- Display Name -->
            <div>
                <label class="text-xs font-medium mb-1 block" style="color:var(--text-secondary)">Display Name</label>
                <input type="text" name="name" class="input-dark w-full text-xs" placeholder="e.g. Production Slack Token" required>
            </div>
            <!-- Secret Value -->
            <div>
                <label class="text-xs font-medium mb-1 block" style="color:var(--text-secondary)">Secret Value</label>
                <input type="password" name="value" class="input-dark w-full text-xs" placeholder="Enter the secret/API key" required>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button type="submit" class="btn btn-approve text-xs">Save Credential</button>
            <button type="button" class="btn text-xs" style="background:rgba(255,255,255,.05);color:var(--text-secondary);border:1px solid rgba(255,255,255,.08)"
                    hx-get="/api/workspace/credentials"
                    hx-target="#credential-form-container"
                    hx-swap="innerHTML">Cancel</button>
        </div>
        <p class="text-[10px] mt-1" style="color:var(--text-muted)">Credentials are encrypted at rest and used during compilation and deployment.</p>
    </form>
</div>
