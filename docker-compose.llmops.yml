services:
  # ===========================================
  # PostgreSQL - Database (LLMOPS profile)
  # ===========================================
  postgres:
    image: postgres:15-alpine
    container_name: sarthi-llmops-postgres
    environment:
      POSTGRES_USER: iterateswarm
      POSTGRES_PASSWORD: iterateswarm
      POSTGRES_DB: iterateswarm
    ports:
      - "5433:5432"
    volumes:
      - sarthi-llmops-postgres-data:/var/lib/postgresql/data
    networks:
      - iterateswarm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iterateswarm -d iterateswarm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Redis - Caching & Session Store (LLMOPS profile)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: sarthi-llmops-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - iterateswarm-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===========================================
  # Jaeger - Distributed Tracing
  # ===========================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: sarthi-llmops-jaeger
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks:
      - iterateswarm-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose -O /dev/null http://localhost:16686/api/services 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ===========================================
  # MinIO - S3-compatible Object Storage
  # ===========================================
  minio:
    image: minio/minio:latest
    container_name: sarthi-llmops-minio
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /data --console-address ":9001"
    volumes:
      - sarthi-llmops-minio-data:/data
    networks:
      - iterateswarm-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ===========================================
  # Langfuse - LLM Observability (Web)
  # ===========================================
  langfuse:
    image: langfuse/langfuse:3.173
    container_name: sarthi-llmops-langfuse
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://iterateswarm:iterateswarm@postgres:5432/iterateswarm
      NEXTAUTH_SECRET: dev-secret-do-not-use-in-prod
      NEXTAUTH_URL: http://localhost:4000
      SALT: dev-salt-do-not-use-in-prod
      TELEMETRY_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iterateswarm-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ===========================================
  # Langfuse Worker - Async Queue Processor
  # ===========================================
  langfuse-worker:
    image: langfuse/langfuse:3.173
    container_name: sarthi-llmops-langfuse-worker
    command: langfuse-worker
    environment:
      DATABASE_URL: postgresql://iterateswarm:iterateswarm@postgres:5432/iterateswarm
      NEXTAUTH_SECRET: dev-secret-do-not-use-in-prod
      NEXTAUTH_URL: http://localhost:4000
      SALT: dev-salt-do-not-use-in-prod
      TELEMETRY_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iterateswarm-net

volumes:
  sarthi-llmops-postgres-data:
    driver: local
  sarthi-llmops-minio-data:
    driver: local

networks:
  iterateswarm-net:
    driver: bridge
