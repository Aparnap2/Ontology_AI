name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go tests (go 1.24)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Verify queue contract constant exists
        run: |
          grep -q 'ONTOLOGYAI_MAIN_QUEUE = "ONTOLOGYAI-MAIN-QUEUE"' apps/core/internal/temporal/client.go \
            || { echo "::error::ONTOLOGYAI_MAIN_QUEUE constant missing in Go temporal client"; exit 1; }

      - name: Go build
        working-directory: apps/core
        run: go build ./...

      - name: Go test
        working-directory: apps/core
        run: go test ./...

  python:
    name: Python tests (3.13)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Verify queue contract constant exists
        run: |
          grep -q 'ONTOLOGYAI_MAIN_QUEUE = "ONTOLOGYAI-MAIN-QUEUE"' apps/ai/src/orchestration/queue.py \
            || { echo "::error::ONTOLOGYAI_MAIN_QUEUE constant missing in Python queue module"; exit 1; }

      - name: Python tests
        working-directory: apps/ai
        run: uv run pytest tests/ -q
